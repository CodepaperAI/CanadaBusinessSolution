  </text>
  <circle cx="290" cy="507" r="3" fill="white" fill-opacity="0.5" />
  <text x="312" y="515" fill="white" fill-opacity="0.76" font-family="Arial, sans-serif" font-size="22" font-weight="500">
    info@canadabusinesssolutions.ca
